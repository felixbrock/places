    // Tabbed filter switching. Search bar and chip panels share the same
    // overlay slot below the band — only one is open at a time.
    document.querySelectorAll(".tab[data-tab]").forEach(t => {
      t.addEventListener("click", () => {
        if (state.searchOpen) setSearchOpen(false);
        switchTab(t.dataset.tab);
      });
    });

    // Chip panels are floating overlays — only interactions INSIDE the panel
    // itself keep it open. Clicks on the blue banner, page content, map, etc.
    // dismiss it. Tabs are exempted because they own the open/close toggle.
    //
    // Capture phase: chip click handlers call applyFilterChange() and replace
    // the panel's children, so by the time a bubble-phase handler ran the
    // original chip would already be detached and closest() would miss.
    document.addEventListener("click", (e) => {
      if (!state.activeTab) return;
      if (e.target.closest(".chips.tab-panel")) return;
      if (e.target.closest(".filter-tabs")) return;
      switchTab(null);
    }, true);

    // Search bar — toggle visibility, fuzzy-search entries on input.
    const searchToggle = document.getElementById("searchToggle");
    const searchBar = document.getElementById("searchBar");
    const searchInput = document.getElementById("searchInput");
    const searchClear = document.getElementById("searchClear");

    // Show the platform-correct shortcut hint inside the search toggle and
    // keep aria-label / title in sync.
    const isMac = /Mac|iPhone|iPad|iPod/.test(navigator.userAgent || "");
    const shortcutLabel = isMac ? "⌘ K" : "Ctrl K";
    const shortcutTitleLabel = isMac ? "⌘K" : "Ctrl+K";
    const searchKbd = document.getElementById("searchKbd");
    if (searchKbd) searchKbd.textContent = shortcutLabel;
    searchToggle.setAttribute("aria-label", `Search places (${shortcutTitleLabel})`);
    searchToggle.setAttribute("title", `Search (${shortcutTitleLabel})`);

    function setSearchOpen(open) {
      state.searchOpen = open;
      searchBar.hidden = !open;
      searchToggle.classList.toggle("is-active", open);
      searchToggle.setAttribute("aria-expanded", open ? "true" : "false");
      if (open) {
        searchInput.focus();
      } else if (state.searchQuery) {
        // Clear active query when collapsing the search bar so filtering doesn't
        // silently persist while the input is invisible.
        searchInput.value = "";
        state.searchQuery = "";
        searchClear.hidden = true;
        applyFilterChange();
      }
    }
    searchToggle.addEventListener("click", () => {
      // Mutually exclusive with chip panels — close any open tab first.
      if (!state.searchOpen && state.activeTab) switchTab(null);
      setSearchOpen(!state.searchOpen);
    });
    let searchTimer = null;
    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim().toLowerCase();
      searchClear.hidden = !q;
      if (q === state.searchQuery) return;
      // Debounce so the map doesn't fly-to-bounds on every keystroke.
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.searchQuery = q;
        applyFilterChange();
      }, 200);
    });
    searchClear.addEventListener("click", () => {
      searchInput.value = "";
      searchClear.hidden = true;
      if (state.searchQuery) {
        state.searchQuery = "";
        applyFilterChange();
      }
      searchInput.focus();
    });
    // Esc inside the search input closes the search bar.
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Escape") setSearchOpen(false);
    });
    // Auto-close on blur — but skip when focus is moving to the clear button
    // (which refocuses the input) or the toggle button (whose own click handler
    // toggles state, so we'd otherwise double-act and reopen).
    searchInput.addEventListener("blur", (e) => {
      if (e.relatedTarget === searchClear || e.relatedTarget === searchToggle) return;
      if (state.searchOpen) setSearchOpen(false);
    });

    // Lightbox close handlers — only the empty overlay area closes; children (image,
    // caption, link, close button) handle their own clicks.
    const lb = document.getElementById("lightbox");
    lb.addEventListener("click", (e) => { if (e.target === lb) closeLightbox(); });
    document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !document.getElementById("lightbox").hidden) closeLightbox();
      // Ctrl+K (or Cmd+K) opens the search bar from anywhere on the page.
      if ((e.ctrlKey || e.metaKey) && !e.altKey && (e.key === "k" || e.key === "K")) {
        e.preventDefault();
        if (!state.searchOpen) {
          // Mutually exclusive with chip panels — close any open tab first.
          if (state.activeTab) switchTab(null);
          setSearchOpen(true);
        } else searchInput.select();
      }
    });

    // Sticky shadow sentinel
    const sentinel = document.createElement("div");
    sentinel.style.cssText = "position:absolute;top:0;left:0;width:1px;height:1px;";
    const filtersWrap = document.getElementById("filtersWrap");
    filtersWrap.parentNode.insertBefore(sentinel, filtersWrap);
    if ("IntersectionObserver" in window) {
      const io = new IntersectionObserver(([entry]) => {
        filtersWrap.classList.toggle("is-stuck", !entry.isIntersecting);
      }, { threshold: [1] });
      io.observe(sentinel);
    }

    // Track filter bar height as a CSS var for the sticky map's top offset
    const updateFilterH = () => {
      const f = document.getElementById("filtersWrap");
      if (!f || f.hidden) return;
      // Only matters on desktop where the filter bar is sticky; on mobile we set 0
      const isMobile = window.matchMedia("(max-width: 980px)").matches;
      const h = isMobile ? 0 : f.offsetHeight;
      document.documentElement.style.setProperty("--filter-h", h + "px");
      // Also nudge the map to recalculate its size after layout shifts
      // pan: false — never recenter the map when the filter bar resizes (badge changes,
      // active-filter chip appears, etc.). Recentering felt like the map was "jumping".
      if (state.map) state.map.invalidateSize({ pan: false });
    };
    updateFilterH();
    if ("ResizeObserver" in window) new ResizeObserver(updateFilterH).observe(filtersWrap);
    window.addEventListener("resize", updateFilterH);
  }

  try {
    const [resMd, resCoords, resImages] = await Promise.all([
      fetch(SOURCE, { cache: "no-cache" }),
      fetch(COORDS, { cache: "no-cache" }),
      fetch("./images.json", { cache: "no-cache" }).catch(() => null),
    ]);
    if (!resMd.ok) throw new Error(`markdown HTTP ${resMd.status}`);
    const md = await resMd.text();
    state.coords = resCoords.ok ? await resCoords.json() : {};
    state.images = (resImages && resImages.ok) ? await resImages.json() : {};

    const parsed = parseMarkdown(md);
    state.sections = parsed.sections;

    // Aggregate area & tag counts
    state.allAreaCounts = new Map();
    state.allTagCounts = new Map();
    for (const sec of state.sections)
      for (const e of sec.entries)
        for (const t of e.tags) {
          const map = AREA_TAGS.has(t) ? state.allAreaCounts : state.allTagCounts;
          map.set(t, (map.get(t) || 0) + 1);
        }

    if (parsed.intro.mapsLink) document.getElementById("mapCta").href = parsed.intro.mapsLink;

    document.getElementById("filtersWrap").hidden = false;
    renderTypeChips();
    renderAreaChips();
    renderTagChips();
    renderTabBadges();
    renderActiveFilters();
    updateMeta();
    renderEntries();
    attachGlobals();

    // Init map after Leaflet has loaded
    if (window.L) initMap();
    else window.addEventListener("load", initMap, { once: true });

    const lm = resMd.headers.get("last-modified");
    if (lm) {
      const d = new Date(lm);
      document.getElementById("lastUpdated").textContent =
        "updated " + d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }).toLowerCase();
    } else {
      document.getElementById("lastUpdated").textContent = "";
    }
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<div class="empty">Couldn't load the guide.<small>${htmlEscape(e.message || String(e))}</small></div>`;
  }
})();
</script>
</body>
</html>
